name: Deploy to VPS

# Se déclenche à chaque push sur main (et manuellement depuis l'onglet Actions).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Empêche deux déploiements simultanés (le plus récent gagne).
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH sur le VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export PATH="$PATH:/usr/bin:/usr/local/bin:$HOME/.local/share/pnpm"
            cd "${{ secrets.VPS_APP_DIR }}"

            echo "==> Récupération du dernier code (main)"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Installation des dépendances"
            corepack enable
            pnpm install --frozen-lockfile

            echo "==> Build de production"
            pnpm build

            echo "==> Redémarrage via PM2"
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save

            echo "==> Déploiement terminé"
